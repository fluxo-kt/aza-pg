name: Junie Comment

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  junie:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@junie-agent')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@junie-agent')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@junie-agent')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@junie-agent') || contains(github.event.issue.title, '@junie-agent')))
    runs-on: ubuntu-latest
    timeout-minutes: 23
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
      security-events: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 30 # Longer history for better diff analysis

      - name: React to the comment right away
        uses: dkershner6/reaction-action@97ede302a1b145b3739dec3ca84a489a34ef48b5 # v2.2.1
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          reaction: "+1"

      # https://junie.jetbrains.com/docs/junie-on-github.html#setup
      # https://github.com/JetBrains/junie-github-action/blob/main/COOKBOOK.md#setup
      # https://github.com/JetBrains/junie-github-action/blob/main/action.yml
      # Also, `@junie-agent code-review` is a special command that will trigger a code review prompt.
      - name: Run Junie
        id: junie
        timeout-minutes: 20
        uses: JetBrains/junie-github-action@e98483eebe3270dc041ff6df56850dc5aa5be84c # v1.1.0
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
